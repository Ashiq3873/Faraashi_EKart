{% extends 'base.html' %}
{% block title %}Sign In - Faraashi-Ekart{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome back</h2>
            <p>Sign in to your Faraashi-Ekart account</p>
        </div>

        <form method="POST">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">
                    Password
                    <a href="#" id="togglePassword" style="float: right; font-size: 0.8125rem; font-weight: 500;">Show</a>
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="passwordInput" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 8px;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register{% if next %}?next={{ next }}{% endif %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const toggle = document.getElementById('togglePassword');
    const pwd = document.getElementById('passwordInput');
    toggle.addEventListener('click', function (e) {
        e.preventDefault();
        const isPassword = pwd.type === 'password';
        pwd.type = isPassword ? 'text' : 'password';
        toggle.textContent = isPassword ? 'Hide' : 'Show';
    });
</script>
{% endblock %}
